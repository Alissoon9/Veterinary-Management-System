<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Mostrar Citas</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<header>
    <h1>Lista de Citas</h1>
</header>

<div class="container">
<h2>Lista de Citas</h2>

<table border="1">

<tr>
    <th>ID</th>
    <th>Fecha</th>
    <th>Hora</th>
    <th>Motivo</th>
    <th>Mascota</th>
    <th>Veterinario</th>
  
</tr>

{% for cita in citas %}

<tr>

<td>{{ cita[0] }}</td>
<td>{{ cita[1] }}</td>
<td>{{ cita[2] }}</td>
<td>{{ cita[3] }}</td>
<td>{{ cita[4] }}</td>
<td>{{ cita[5] }}</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/">Volver al Inicio</a>

</div>

</body>

</html>
