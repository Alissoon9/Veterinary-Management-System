<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Mostrar Mascotas</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<header>
    <h1>Lista de Mascotas</h1>
</header>

<div class="container">

<h2>Lista de Mascotas</h2>

<table border="1">

<tr>
    <th>id</th>
    <th>Nombre</th>
    <th>Edad</th>
    <th>Raza</th>
    <th>Dueño</th>
</tr>

{% for mascota in mascotas %}

<tr>

<td>{{ mascota[0] }}</td>
<td>{{ mascota[1] }}</td>
<td>{{ mascota[2] }}</td>
<td>{{ mascota[3] }}</td>
<td>{{ mascota[4] }}</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/">Volver al Inicio</a>

</div>

</body>

</html>
