<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registrar Mascota</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<header>
    <h1> Registrar Mascota</h1>
</header>

<div class="container">

<form method="POST">

<label>Nombre</label><br>
<input type="text" name="nombre"><br><br>

<label>Edad</label><br>
<input type="text" name="edad"><br><br>

<label>Raza</label><br>
<input type="text" name="raza"><br><br>

<label>Dueño</label><br>

<select name="id_dueno">

{% for dueno in duenos %}

<option value="{{ dueno[0] }}">
    {{ dueno[1] }}
</option>

{% endfor %}

</select>

<br><br>

<button type="submit">Guardar</button>

</form>

</div>

</body>
</html>
